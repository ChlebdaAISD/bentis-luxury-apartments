<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ---------- Icon helper (lucide) ---------- */
const Icon = ({ name, className = "", size = 20, stroke = 1.25 }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const svg = window.lucide.createElement(window.lucide.icons[name] || window.lucide.icons['Circle']);
      svg.setAttribute('width', size);
      svg.setAttribute('height', size);
      svg.setAttribute('stroke-width', stroke);
      ref.current.appendChild(svg);
    }
  }, [name, size, stroke]);
  return <span ref={ref} className={className} />;
};

/* ---------- Logo mark (original, not copied) ---------- */
const LogoMark = ({ color = '#D4AF37', size = 28 }) => (
  <svg viewBox="0 0 64 64" width={size} height={size} aria-hidden="true" className="block">
    <circle cx="32" cy="32" r="30" fill="none" stroke={color} strokeWidth="1" />
    <circle cx="32" cy="32" r="23" fill="none" stroke={color} strokeWidth="0.6" opacity="0.7" />
    <text x="32" y="40" textAnchor="middle" fontFamily="Cormorant Garamond, serif" fontSize="28" fontWeight="500" fill={color}>B</text>
  </svg>
);

const Wordmark = ({ color = '#D4AF37' }) => (
  <div className="flex items-center gap-3">
    <LogoMark color={color} size={30} />
    <div className="leading-none">
      <div className="font-serif text-lg tracking-[0.32em]" style={{color}}>BENTIS</div>
      <div className="font-sans text-[9px] tracking-[0.45em] mt-1" style={{color, opacity:.7}}>APARTAMENTY · KRAKÓW</div>
    </div>
  </div>
);

/* ---------- Reveal hook ---------- */
const useReveal = () => {
  useEffect(() => {
    const els = document.querySelectorAll('.rv');
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.14 });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);
};

/* ---------- Split text (char by char) ---------- */
const SplitText = ({ text, className = "", delayStart = 0, stagger = 30 }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const chars = ref.current.querySelectorAll('.char');
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          chars.forEach((c, i) => {
            setTimeout(() => c.classList.add('in'), delayStart + i * stagger);
          });
          io.disconnect();
        }
      });
    }, { threshold: 0.2 });
    io.observe(ref.current);
    return () => io.disconnect();
  }, [text, delayStart, stagger]);
  const words = text.split(' ');
  return (
    <span ref={ref} className={className}>
      {words.map((w, wi) => (
        <span key={wi} className="inline-block whitespace-nowrap mr-[0.25em]">
          {[...w].map((ch, i) => (
            <span key={i} className="char">{ch}</span>
          ))}
        </span>
      ))}
    </span>
  );
};

/* ---------- Placeholder image ---------- */

        {note && <div className={`ph-label mt-1 ${variant==='dark' ? 'ph-label-light' : ''} opacity-60`}>{note}</div>}
      </div>
    </div>
  );
};

    { href: '#kontakt', label: 'Kontakt' },

  const isDark = !scrolled;
  return (
    <>
      <header className={`fixed top-0 left-0 right-0 z-50 transition-colors duration-500 ${scrolled ? 'bg-white/95 backdrop-blur border-b border-black/5' : 'bg-gradient-to-b from-black/60 via-black/30 to-transparent'}`}>

};

/* ---------- LIGHTBOX ---------- */
const Lightbox = ({ index, setIndex, close }) => {
  useEffect(() => {
    if (index === null) return;
    const onKey = (e) => {
      if (e.key === 'Escape') close();
      if (e.key === 'ArrowRight') setIndex((i) => (i + 1) % GAL.length);
      if (e.key === 'ArrowLeft') setIndex((i) => (i - 1 + GAL.length) % GAL.length);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [index, setIndex, close]);

  // swipe
  const startX = useRef(0);
  if (index === null) return null;
  const g = GAL[index];
  return (
    <div className="fixed inset-0 z-[90] bg-black/95 flex items-center justify-center"
      onTouchStart={(e)=>{ startX.current = e.touches[0].clientX; }}
      onTouchEnd={(e)=>{
        const dx = e.changedTouches[0].clientX - startX.current;
        if (dx > 50) setIndex((i)=> (i - 1 + GAL.length) % GAL.length);
        if (dx < -50) setIndex((i)=> (i + 1) % GAL.length);
      }}>
      <button onClick={close} className="absolute top-6 right-6 w-11 h-11 rounded-full border border-white/30 text-white/90 flex items-center justify-center hover:border-bentis-gold hover:text-bentis-gold transition-colors duration-300"><Icon name="X" size={18}/></button>
      <button onClick={()=>setIndex((i)=>(i - 1 + GAL.length) % GAL.length)} className="absolute left-6 w-11 h-11 rounded-full border border-white/30 text-white/90 flex items-center justify-center hover:border-bentis-gold hover:text-bentis-gold transition-colors duration-300"><Icon name="ChevronLeft" size={18}/></button>
      <button onClick={()=>setIndex((i)=>(i + 1) % GAL.length)} className="absolute right-6 w-11 h-11 rounded-full border border-white/30 text-white/90 flex items-center justify-center hover:border-bentis-gold hover:text-bentis-gold transition-colors duration-300"><Icon name="ChevronRight" size={18}/></button>
      <div className="max-w-[86vw] max-h-[82vh] w-[960px]">
        <img src={g.src} alt={`Bentis Apartments — zdjęcie ${index+1}`} className="w-full max-h-[82vh] object-contain" />
        <div className="mt-4 text-center text-white/60 text-[11px] tracking-[0.3em] uppercase">{index+1} / {GAL.length}</div>
      </div>
    </div>
  );
};
